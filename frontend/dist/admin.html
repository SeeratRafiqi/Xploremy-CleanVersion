<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Console · GoLive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <style>
    :root {
      --bg: #000000;
      --panel: rgba(18, 18, 18, 0.92);
      --panel-2: rgba(22, 22, 22, 0.95);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef3f3;
      --muted: #9ea8a8;
      --teal: #00d4aa;
      --cyan: #7af0d8;
      --gold: #d4a017;
      --danger-bg: rgba(160, 58, 58, 0.22);
      --danger-line: rgba(247, 133, 133, 0.35);
      --glass-blur: blur(12px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #000000;
      color: var(--text);
      min-height: 100vh;
    }
    .dash-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse 60% 45% at 10% -8%, rgba(0, 212, 170, 0.07), transparent 55%),
        radial-gradient(ellipse 45% 40% at 92% 8%, rgba(212, 160, 23, 0.05), transparent 50%);
    }
    .dash-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.28;
      background-image:
        radial-gradient(1.5px 1.5px at 10% 20%, rgba(255, 255, 255, 0.35), transparent),
        radial-gradient(1px 1px at 25% 65%, rgba(0, 212, 170, 0.3), transparent),
        radial-gradient(1.5px 1.5px at 45% 35%, rgba(255, 255, 255, 0.25), transparent),
        radial-gradient(1px 1px at 62% 78%, rgba(212, 160, 23, 0.28), transparent),
        radial-gradient(1.5px 1.5px at 78% 22%, rgba(0, 212, 170, 0.22), transparent),
        radial-gradient(1px 1px at 88% 58%, rgba(255, 255, 255, 0.2), transparent),
        radial-gradient(1px 1px at 35% 88%, rgba(212, 160, 23, 0.18), transparent);
      background-size: 100% 100%;
    }
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 248px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 18px 20px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .sidebar {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: 14px;
      padding: 18px 14px;
      align-self: start;
      position: sticky;
      top: 18px;
      min-height: calc(100vh - 42px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 8px 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 1rem;
    }
    .brand-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      color: var(--cyan);
      filter: drop-shadow(0 0 8px rgba(0, 212, 170, 0.4));
    }
    .brand-text {
      background: linear-gradient(90deg, var(--teal) 0%, var(--cyan) 45%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav button {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      color: #d9e1e1;
      background: transparent;
      border-radius: 10px;
      padding: 11px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      font-family: inherit;
      transition: border-color .18s, background .18s, color .18s, box-shadow .18s;
    }
    .nav button:hover {
      border-color: rgba(0, 212, 170, 0.35);
      background: rgba(0, 212, 170, 0.08);
      color: #ebfffa;
    }
    .nav button.is-active {
      border-color: rgba(0, 212, 170, 0.5);
      color: #ebfffa;
      background: rgba(0, 212, 170, 0.13);
      box-shadow: inset 0 0 0 1px rgba(0, 212, 170, 0.1);
    }
    .main {
      padding: 0;
      min-width: 0;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }
    .sub { font-size: .84rem; color: var(--muted); margin-top: 4px; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .topbar-actions .btn-signout {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(16, 16, 16, 0.85);
      color: var(--text);
      font-family: inherit;
      font-size: .82rem;
      font-weight: 500;
      padding: 9px 14px;
      cursor: pointer;
      transition: border-color .18s, color .18s, background .18s;
      backdrop-filter: var(--glass-blur);
    }
    .topbar-actions .btn-signout:hover {
      border-color: rgba(248, 113, 113, 0.45);
      color: #fecaca;
      background: var(--danger-bg);
    }
    .err {
      margin: 14px 0;
      border: 1px solid var(--danger-line);
      background: var(--danger-bg);
      color: #fecaca;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: .88rem;
      backdrop-filter: var(--glass-blur);
    }
    .stats {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
    }
    .stat {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: var(--glass-blur);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
    }
    .stat::after {
      content: '';
      position: absolute;
      bottom: -20px;
      right: -20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 170, 0.15), transparent 70%);
      pointer-events: none;
    }
    .stat .k { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; }
    .stat .v {
      margin-top: 8px;
      font-size: 1.35rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: #f8fafc;
    }
    .card {
      margin-top: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: var(--glass-blur);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
      gap: 10px;
      flex-wrap: wrap;
    }
    .card-title { font-size: .95rem; font-weight: 600; color: #f1f5f9; }
    .meta { color: var(--muted); font-size: .8rem; }
    .controls { display: flex; align-items: center; gap: 8px; }
    .controls button, .controls select {
      border: 1px solid var(--line);
      background: rgba(16, 16, 16, 0.9);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: .8rem;
      font-family: inherit;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: .84rem;
      vertical-align: top;
      text-align: left;
    }
    th {
      color: #d6efea;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      background: rgba(18, 18, 18, 0.95);
      cursor: default;
    }
    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--teal); }
    tr:hover td { background: rgba(0, 212, 170, 0.04); }
    .pill {
      border: 1px solid rgba(212, 160, 23, 0.45);
      color: #ffe6aa;
      background: rgba(212, 160, 23, 0.08);
      padding: 3px 9px;
      border-radius: 999px;
      font-size: .72rem;
      display: inline-block;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      background: rgba(12, 12, 12, 0.85);
    }
    .pagination button {
      border: 1px solid var(--line);
      background: rgba(16, 16, 16, 0.9);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: .78rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .pagination button:hover:not(:disabled) {
      border-color: rgba(0, 212, 170, 0.45);
      background: rgba(24, 24, 24, 0.9);
    }
    .pagination button:disabled { opacity: .45; cursor: default; }
    .empty { color: var(--muted); font-size: .9rem; padding: 20px; }

    /* —— Overview: tourism intelligence dashboard —— */
    .overview-dash {
      display: flex;
      flex-direction: column;
      gap: 22px;
      --ov-card-h: 400px;
    }
    .ov-dash-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      align-items: stretch;
    }
    .ov-dash-span-12 { grid-column: span 12; }
    .ov-dash-span-6 { grid-column: span 6; }
    .ov-dash-span-4 { grid-column: span 4; }
    @media (max-width: 1100px) {
      .ov-dash-grid > .ov-dash-span-12,
      .ov-dash-grid > .ov-dash-span-6,
      .ov-dash-grid > .ov-dash-span-4 { grid-column: span 12; }
    }
    .ov-hero {
      border-radius: 16px;
      padding: 28px 32px;
      background: linear-gradient(135deg, #0a1614 0%, #0d1f1c 40%, #12100a 100%);
      backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(0, 212, 170, 0.35);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(212, 160, 23, 0.12);
      position: relative;
      overflow: hidden;
    }
    .ov-hero::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 45%;
      height: 180%;
      background: radial-gradient(ellipse, rgba(0, 212, 170, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .ov-hero h2 {
      font-size: clamp(1.25rem, 2.5vw, 1.65rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, var(--teal) 0%, #7af0d8 45%, var(--gold) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
    }
    .ov-hero p {
      margin-top: 10px;
      font-size: .92rem;
      color: rgba(212, 160, 23, 0.85);
      position: relative;
    }
    .ov-section-title {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .stats.ov-stats-row {
      grid-template-columns: repeat(4, 1fr);
    }
    @media (max-width: 1100px) {
      .stats.ov-stats-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 520px) {
      .stats.ov-stats-row { grid-template-columns: 1fr; }
    }
    .ov-impact-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    @media (max-width: 960px) {
      .ov-impact-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .ov-impact {
      border: 1px solid rgba(0, 212, 170, 0.4);
      background: linear-gradient(165deg, rgba(0, 212, 170, 0.08) 0%, #101010 55%);
      backdrop-filter: var(--glass-blur);
      border-radius: 14px;
      padding: 20px 18px;
      min-height: 110px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.22);
    }
    .ov-impact::after {
      content: '';
      position: absolute;
      bottom: -24px;
      right: -24px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 170, 0.12), transparent 70%);
      pointer-events: none;
    }
    .ov-impact .k { color: #b8e8df; font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; }
    .ov-impact .v {
      margin-top: 12px;
      font-size: clamp(1.6rem, 3vw, 2.1rem);
      font-weight: 700;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: var(--teal);
      line-height: 1.1;
    }
    .ov-impact .v.gold { color: var(--gold); }
    .ov-chart-card,
    .ov-geo-card {
      border: 1px solid var(--line);
      backdrop-filter: var(--glass-blur);
      border-radius: 12px;
      padding: 16px 18px 18px;
      min-height: 0;
      height: var(--ov-card-h);
      max-height: var(--ov-card-h);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.22);
      overflow: hidden;
    }
    .ov-chart-card {
      background: var(--panel);
    }
    .ov-chart-card h3 {
      font-size: .84rem;
      font-weight: 600;
      margin-bottom: 0;
      color: #f1f5f9;
    }
    .ov-chart-card .ov-card-head {
      margin-bottom: 4px;
    }
    .ov-chart-card .ov-chart-meta {
      font-size: .68rem;
      margin-bottom: 0;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ov-chart-card .ov-card-viz {
      min-height: 0;
      flex: 1;
      justify-content: center;
    }
    .ov-chart-card .ov-card-foot {
      flex-shrink: 0;
      margin-top: 6px;
      padding-top: 6px;
    }
    .ov-chart-card .ov-card-viz .ov-chart-wrap {
      min-height: 0;
      height: 100%;
      flex: 1;
    }
    .ov-chart-card .ov-chart-empty {
      min-height: 0;
      height: 100%;
      padding: 12px;
      font-size: .76rem;
    }
    .ov-chart-card--demand-supply .ov-card-head {
      margin-bottom: 2px;
    }
    .ov-chart-card--demand-supply .ov-chart-meta {
      -webkit-line-clamp: 1;
      font-size: .64rem;
      line-height: 1.25;
    }
    .ov-chart-card--demand-supply .ov-card-viz {
      flex: 1 1 auto;
      min-height: 0;
      margin-top: -2px;
    }
    .ov-chart-card--demand-supply .ov-chart-wrap {
      min-height: 0;
      height: 100%;
    }
    .ov-chart-card--peak-timeline .ov-card-viz {
      flex: 1;
      min-height: 0;
    }
    .ov-chart-card--peak-timeline.ov-dash-span-6,
    .ov-chart-card--segments.ov-dash-span-6 {
      height: 440px;
      max-height: 440px;
    }
    .ov-chart-card--peak-timeline.ov-dash-span-6 .ov-card-head {
      margin-bottom: 2px;
    }
    .ov-chart-card--peak-timeline.ov-dash-span-6 .ov-chart-meta {
      display: none;
    }
    .ov-chart-card--peak-timeline.ov-dash-span-6 .ov-card-foot {
      font-size: 0.64rem;
      gap: 6px 14px;
      flex-wrap: wrap;
      padding-top: 4px;
      margin-top: 4px;
    }
    .ov-chart-card--peak-timeline.ov-dash-span-6 .ov-peak-timeline-split {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
    }
    .ov-chart-card--peak-timeline.ov-dash-span-6 .ov-peak-timeline-pane {
      gap: 4px;
      padding: 6px 8px 2px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .ov-chart-card--peak-timeline.ov-dash-span-6 .ov-peak-timeline-pane h4 {
      font-size: 0.66rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .ov-peak-timeline-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    .ov-peak-timeline-split--compact {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
    }
    @media (max-width: 760px) {
      .ov-peak-timeline-split:not(.ov-peak-timeline-split--compact) { grid-template-columns: 1fr; }
    }
    .ov-peak-timeline-pane {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ov-peak-timeline-pane h4 {
      font-size: .72rem;
      font-weight: 600;
      color: #e8f4f2;
      margin: 0;
      flex-shrink: 0;
    }
    .ov-peak-timeline-split--compact .ov-peak-timeline-pane h4 {
      font-size: 0.62rem;
    }
    .ov-peak-timeline-pane .ov-chart-wrap {
      flex: 1;
      min-height: 0;
      height: 100%;
    }
    .ov-chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      height: 100%;
      width: 100%;
    }
    .ov-funnel-viz {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      padding: 0;
      overflow: hidden;
    }
    .ov-funnel-row {
      flex: 1 1 0;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 68px;
      align-items: center;
      gap: 8px;
    }
    .ov-funnel-trap-col {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    .ov-funnel-trap {
      width: 100%;
      height: 100%;
      max-height: 62px;
      clip-path: polygon(
        calc((100% - var(--top-w, 100%) * 1%) / 2) 0%,
        calc((100% + var(--top-w, 100%) * 1%) / 2) 0%,
        calc((100% + var(--bot-w, 80%) * 1%) / 2) 100%,
        calc((100% - var(--bot-w, 80%) * 1%) / 2) 100%
      );
      background: var(--funnel-bg, rgba(0, 212, 170, 0.85));
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 0 6px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    .ov-funnel-trap-in {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.15;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
    }
    .ov-funnel-trap-name {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: rgba(8, 28, 24, 0.88);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .ov-funnel-trap-num {
      font-size: .86rem;
      font-weight: 800;
      color: #061a14;
      letter-spacing: 0.01em;
    }
    .ov-funnel-trap-step {
      font-size: .5rem;
      font-weight: 600;
      color: rgba(8, 28, 24, 0.65);
    }
    .ov-funnel-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 1px;
      line-height: 1.2;
    }
    .ov-funnel-meta-drop {
      font-size: .58rem;
      font-weight: 600;
      color: #f0a0a0;
      white-space: nowrap;
    }
    .ov-funnel-meta-step {
      font-size: .56rem;
      color: #9ea8a8;
      white-space: nowrap;
    }
    .ov-funnel-meta-entry {
      font-size: .56rem;
      color: #7af0d8;
      font-weight: 600;
      white-space: nowrap;
    }
    .ov-card-head {
      flex-shrink: 0;
      width: 100%;
      text-align: left;
    }
    .ov-card-head h3 { margin-bottom: 6px; }
    .ov-card-head .ov-geo-meta,
    .ov-card-head .ov-chart-meta {
      margin-bottom: 12px;
    }
    .ov-chart-meta {
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .ov-card-viz {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .ov-card-viz .ov-chart-wrap {
      width: 100%;
      flex: 1;
      min-height: 0;
      margin: 0 auto;
    }
    .ov-geo-card .ov-card-viz .ov-geo-chart-wrap {
      width: 100%;
      flex: 1;
      min-height: 0;
      margin: 0 auto;
    }
    .ov-card-foot {
      flex-shrink: 0;
      width: 100%;
      text-align: left;
      margin-top: 12px;
      padding-top: 10px;

<body>
  <div class="dash-bg" aria-hidden="true"></div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 2L4 7v10l8 5 8-5V7l-8-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        <span class="brand-text">GoLive Admin</span>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="title">Admin Console</h1>
          <p class="sub">Internal analytics dashboard for admin@golive.com</p>
        </div>
        <div class="topbar-actions">
          <button type="button" class="btn-signout" id="admin-sign-out-top">Sign out</button>
        </div>
      </header>
      <div id="error" hidden class="err"></div>
      <section id="content"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      'use strict';

      const PAGE_SIZE = 20;
      const sections = [
        { id: 'overview', label: 'Overview' },
        { id: 'users', label: 'Users Table' },
        { id: 'fandna', label: 'Fan DNA Preferences' },
        { id: 'clicks', label: 'Event Clicks' },
        { id: 'popular', label: 'Popular Events' },
        { id: 'itineraries', label: 'Itineraries' },
        { id: 'api-usage', label: 'API Usage' },
      ];

      const state = {
        section: 'overview',
        users: { page: 1, sort: 'email', dir: 'asc' },
        fandna: { page: 1 },
        clicks: { page: 1 },
        popular: { page: 1 },
        itineraries: { userPage: 1, recentPage: 1 },
      };

      function esc(v) {
        return String(v == null ? '' : v)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function showError(msg) {
        const e = document.getElementById('error');
        if (!msg) {
          e.hidden = true;
          e.textContent = '';
          return;
        }
        e.hidden = false;
        e.textContent = msg;
      }

      async function reqMe() {
        const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
        if (!r.ok) return null;
        const j = await r.json();
        return j && j.user ? j.user : null;
      }

      async function ensureAdmin() {
        const u = await reqMe();
        const em = String((u && u.email) || '').trim().toLowerCase();
        if (!u || em !== 'admin@golive.com') {
          location.replace('/auth');
          return false;
        }
        return true;
      }

      async function adminSignOut() {
        try {
          await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
        } catch (e) {
          /* still redirect */
        }

      function featureIso2(props) {
        if (!props) return '';
        const raw =
          props['ISO3166-1-Alpha-2'] ||
          props.ISO_A2 ||
          props.ISO_A2_EH ||
          props.iso_a2 ||
          props.ISO2 ||
          '';
        const code = String(raw).trim().toUpperCase();
        if (!code || code === '-99' || code === 'NULL') return '';
        return code.length === 2 ? code : '';
      }

      function countryMapFill(count, max) {
        if (!count || !max) return 'rgba(28, 36, 44, 0.92)';
        const t = Math.min(1, count / max);
        const alpha = 0.22 + t * 0.78;
        return 'rgba(0, 212, 170, ' + alpha.toFixed(3) + ')';
      }

      async function loadCountriesGeoJson() {
        if (countriesGeoJsonCache) return countriesGeoJsonCache;
        const res = await fetch(COUNTRIES_GEOJSON_URL, { credentials: 'same-origin' });
        if (!res.ok) {
          let msg = 'GeoJSON fetch failed (' + res.status + ')';
          try {
            const errBody = await res.json();
            if (errBody && errBody.error) msg = String(errBody.error);
          } catch (_) {}
          throw new Error(msg);
        }
        countriesGeoJsonCache = await res.json();
        return countriesGeoJsonCache;
      }

      async function initTravelerCountriesMap(tc) {
        const host = document.getElementById('geo-countries-map');
        const chipsHost = document.getElementById('geo-countries-chips');
        if (!host || typeof L === 'undefined') return;

        const entries = (tc && tc.mapEntries) || [];
        const max = (tc && tc.mapMax) || 0;
        const byIso2 = {};
        const byName = {};
        const labelByIso2 = {};
        const unmapped = [];

        entries.forEach(function (e) {
          const key = String(e.label || '')
            .trim()
            .toLowerCase();
          if (key) byName[key] = (byName[key] || 0) + (e.count || 0);
          if (e.iso2) {
            const code = String(e.iso2).toUpperCase();
            byIso2[code] = (byIso2[code] || 0) + (e.count || 0);
            labelByIso2[code] = e.label;
          } else if (e.count > 0) {
            unmapped.push(e);
          }
        });

        function countForFeature(props) {
          const iso2 = featureIso2(props || {});
          if (iso2 && byIso2[iso2]) return byIso2[iso2];
          const nm = String(props.name || props.ADMIN || props.NAME || '')
            .trim()
            .toLowerCase();
          return nm ? byName[nm] || 0 : 0;
        }

        if (!entries.length) {
          host.innerHTML =
            '<div class="ov-chart-empty">No country data from profiles yet.</div>';
          if (chipsHost) chipsHost.innerHTML = '';
          return;
        }

        host.innerHTML =
          '<div class="ov-chart-empty ov-map-loading">Loading world map…</div>';

        try {
          const geojson = await loadCountriesGeoJson();
          host.innerHTML = '';
          const map = L.map(host, {
            zoomControl: true,
            attributionControl: false,
            scrollWheelZoom: false,
            minZoom: 1,
            maxZoom: 5,
          });
          overviewCountryMaps.push(map);

          L.geoJSON(geojson, {
            style: function (feat) {
              const count = countForFeature(feat.properties || {});
              return {
                fillColor: countryMapFill(count, max),
                fillOpacity: count ? 0.92 : 0.55,
                color: count ? 'rgba(0, 212, 170, 0.55)' : 'rgba(255, 255, 255, 0.1)',
                weight: count ? 1 : 0.4,
              };
            },
            onEachFeature: function (feat, layer) {
              const props = feat.properties || {};
              const iso2 = featureIso2(props);
              const count = countForFeature(props);
              const name =
                labelByIso2[iso2] ||
                props.name ||
                props.ADMIN ||
                props.NAME ||
                'Country';
              if (count > 0) {
                const pct = max ? Math.round((count / max) * 100) : 0;
                layer.bindTooltip(
                  '<strong>' +
                    esc(name) +
                    '</strong><br>' +
                    count +
                    ' traveler' +
                    (count === 1 ? '' : 's') +
                    ' · ' +
                    pct +
                    '% of peak',
                  { sticky: true, opacity: 0.95 },
                );
                layer.on('mouseover', function () {
                  layer.setStyle({
                    weight: 2,
                    color: '#d4a017',
                    fillOpacity: 1,
                  });
                });
                layer.on('mouseout', function () {
                  layer.setStyle({
                    fillColor: countryMapFill(count, max),
                    fillOpacity: 0.92,
                    color: 'rgba(0, 212, 170, 0.55)',
                    weight: 1,
                  });
                });
              }
            },
          }).addTo(map);

          map.fitBounds(
            [
              [-58, -175],
              [78, 178],
            ],
            { padding: [6, 6], maxZoom: 2 },
          );

          function refreshMapSize() {
            try {
              map.invalidateSize();
            } catch (_) {}
          }
          requestAnimationFrame(refreshMapSize);
          setTimeout(refreshMapSize, 150);
          setTimeout(refreshMapSize, 500);

          if (chipsHost) {
            const top = entries
              .filter(function (e) {
                return e.iso2;
              })
              .slice(0, 6);
            let chipsHtml = top
              .map(function (e) {
                return (
                  '<span class="ov-country-chip">' +
                  esc(e.label) +
                  ': <b>' +
                  esc(e.count) +
                  '</b></span>'
                );
              })
              .join('');
            unmapped.slice(0, 3).forEach(function (e) {
              chipsHtml +=
                '<span class="ov-country-chip ov-country-chip--muted">' +
                esc(e.label) +
                ': <b>' +
                esc(e.count) +
                '</b> (not on map)</span>';
            });
            chipsHost.innerHTML = chipsHtml;
          }
        } catch (err) {
          host.innerHTML =
            '<div class="ov-chart-empty">Could not load world map.<br><br>' +
            esc(String(err && err.message ? err.message : err)) +
            '</div>';
        }
      }

      function fmtFunnelCount(v) {
        const n = Number(v);

      const FUNNEL_TRAP_WIDTHS = [
        { top: 100, bot: 84 },
        { top: 84, bot: 68 },
        { top: 68, bot: 54 },
        { top: 54, bot: 40 },
        { top: 40, bot: 28 },
      ];

      function funnelTealBg(index, total) {
        const t = total > 1 ? index / (total - 1) : 0;
        const alpha = 0.94 - t * 0.52;
        return 'rgba(0, 212, 170, ' + alpha.toFixed(2) + ')';

      function renderConversionFunnel(funnel) {
        const labels = (funnel && funnel.labels) || [];
        const values = (funnel && funnel.values) || [];
        if (!labels.length) {
          return '<div class="ov-chart-empty">No funnel data yet.</div>';
        }
        const nums = values.map(function (v) {
          return Math.max(0, Number(v) || 0);
        });
        const parts = ['<div class="ov-funnel-viz" role="img" aria-label="Tourism conversion funnel">'];
        labels.forEach(function (label, i) {
          const val = nums[i] || 0;
          const trap = FUNNEL_TRAP_WIDTHS[i] || FUNNEL_TRAP_WIDTHS[FUNNEL_TRAP_WIDTHS.length - 1];
          const stepPct =
            i === 0 ? null : nums[i - 1] > 0 ? Math.round((val / nums[i - 1]) * 1000) / 10 : 0;
          const overallPct = nums[0] > 0 ? Math.round((val / nums[0]) * 1000) / 10 : 0;
          const dropoff =
            i === 0 ? null : nums[i - 1] > 0 ? Math.round((1 - val / nums[i - 1]) * 1000) / 10 : null;
          const metaHtml =
            i === 0
              ? '<span class="ov-funnel-meta-entry">100% entry</span>'
              : '<span class="ov-funnel-meta-drop">↓ ' + esc(dropoff != null ? dropoff + '%' : '—') + '</span>' +
                '<span class="ov-funnel-meta-step">' + esc(stepPct) + '% step</span>';
          const stepInTrap =
            i === 0 ? 'Top of funnel' : esc(overallPct) + '% of top';

          parts.push(
            '<div class="ov-funnel-row">' +
              '<div class="ov-funnel-trap-col">' +
                '<div class="ov-funnel-trap" style="--top-w:' + trap.top + ';--bot-w:' + trap.bot +
                  ';--funnel-bg:' + funnelTealBg(i, labels.length) + '">' +
                  '<div class="ov-funnel-trap-in">' +
                    '<span class="ov-funnel-trap-name">' + esc(label) + '</span>' +
                    '<span class="ov-funnel-trap-num">' + esc(fmtFunnelCount(val)) + '</span>' +
                    '<span class="ov-funnel-trap-step">' + stepInTrap + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<div class="ov-funnel-meta">' + metaHtml + '</div>' +
            '</div>'
          );
        });
        parts.push('</div>');
        return parts.join('');
      }

      function renderAffinityNetworkShell(affinity) {

      function renderAffinityNetworkCard(affinity) {

            '</div></div>' +
            '<div class="ov-card-foot ov-geo-totals">' +

              '<span>Users: <b>' + esc(total) + '</b></span>' +
              (data.topPair
                ? '<span>Top: <b>' + esc(data.topPair.labelA) + ' + ' + esc(data.topPair.labelB) + '</b></span>'

        );

      function initAffinityNetworkGraph(affinity) {
        destroyAffinityNetwork();
        const host = document.getElementById('chart-affinity-network');
        if (!host || typeof d3 === 'undefined') return;

        const data = affinity || {};
        const rawNodes = data.nodes || [];
        const rawLinks = data.links || [];
        if (!rawNodes.length) return;

        const width = Math.max(host.clientWidth || 0, 280);
        const height = Math.max(host.clientHeight || 0, 200);
        const compact = width < 420;
        const nodes = rawNodes.map(function (n) {
          return {
            id: n.id,
            label: n.label,
            clicks: Number(n.clicks) || 0,
            users: Number(n.users) || 0,
          };
        });
        const links = rawLinks.map(function (l) {
          return {
            source: l.source,
            target: l.target,
            count: Number(l.count) || 0,
            labelA: l.labelA,
            labelB: l.labelB,
          };
        });

        const maxClicks = Math.max(data.maxClicks || 0, d3.max(nodes, function (n) { return n.clicks; }) || 0, 1);
        const maxLink = Math.max(data.maxCount || 0, d3.max(links, function (l) { return l.count; }) || 0, 1);
        const radiusScale = d3.scaleSqrt().domain([0, maxClicks]).range(compact ? [9, 26] : [16, 44]);
        const linkWidthScale = d3.scaleLinear().domain([1, maxLink]).range(compact ? [1, 5] : [1.5, 8]);
        const linkOpacityScale = d3.scaleLinear().domain([1, maxLink]).range([0.28, 0.95]);

        host.innerHTML = '';
        const tooltip = d3
          .select(host)
          .append('div')
          .attr('class', 'ov-affinity-tooltip')
          .style('opacity', 0);

        const svg = d3
          .select(host)
          .append('svg')
          .attr('viewBox', [0, 0, width, height])
          .attr('width', '100%')
          .attr('height', '100%')
          .attr('preserveAspectRatio', 'xMidYMid meet');

        const defs = svg.append('defs');
        const glow = defs
          .append('filter')
          .attr('id', 'affinity-node-glow')
          .attr('x', '-50%')
          .attr('y', '-50%')
          .attr('width', '200%')
          .attr('height', '200%');
        glow.append('feGaussianBlur').attr('stdDeviation', '3.5').attr('result', 'blur');
        const merge = glow.append('feMerge');
        merge.append('feMergeNode').attr('in', 'blur');
        merge.append('feMergeNode').attr('in', 'SourceGraphic');

        const root = svg.append('g');
        let activeNodeId = null;
        let activeLink = null;

        function nodeIdOf(d) {
          return d && (typeof d === 'object' ? d.id : d);
        }

        function isConnected(linkDatum, nodeId) {
          if (!nodeId) return false;
          return nodeIdOf(linkDatum.source) === nodeId || nodeIdOf(linkDatum.target) === nodeId;
        }

        function applyHighlight() {
          linkSel
            .classed('ov-affinity-link--dim', function (d) {
              if (!activeNodeId && !activeLink) return false;
              if (activeLink) return d !== activeLink;
              return !isConnected(d, activeNodeId);
            })
            .classed('ov-affinity-link--active', function (d) {
              if (activeLink) return d === activeLink;
              return !!activeNodeId && isConnected(d, activeNodeId);
            });
          nodeSel
            .classed('ov-affinity-node--dim', function (d) {
              if (!activeNodeId && !activeLink) return false;
              if (activeLink) {
                return d.id !== nodeIdOf(activeLink.source) && d.id !== nodeIdOf(activeLink.target);
              }
              if (d.id === activeNodeId) return false;
              return !links.some(function (l) {
                return isConnected(l, activeNodeId) && isConnected(l, d.id);
              });
            })
            .classed('ov-affinity-node--active', function (d) {
              if (activeLink) {
                return d.id === nodeIdOf(activeLink.source) || d.id === nodeIdOf(activeLink.target);
              }
              return activeNodeId === d.id;
            });
        }

        function showTooltip(html, event) {
          const rect = host.getBoundingClientRect();
          tooltip
            .style('opacity', 1)
            .html(html)
            .style('left', event.clientX - rect.left + 14 + 'px')
            .style('top', event.clientY - rect.top - 10 + 'px');
        }

        function hideTooltip() {
          tooltip.style('opacity', 0);
        }

        const linkSel = root
          .append('g')
          .attr('class', 'ov-affinity-links')
          .selectAll('line')
          .data(links)
          .join('line')
          .attr('class', 'ov-affinity-link')
          .attr('stroke', function (d) {
            return 'rgba(0, 212, 170, ' + linkOpacityScale(d.count).toFixed(3) + ')';
          })
          .attr('stroke-width', function (d) {
            return linkWidthScale(d.count);
          })
          .on('mouseenter', function (event, d) {
            activeLink = d;
            activeNodeId = null;
            applyHighlight();
            showTooltip(
              esc(d.count) + ' users enjoy both <b>' + esc(d.labelA) + '</b> and <b>' + esc(d.labelB) + '</b>',
              event
            );
          })
          .on('mousemove', function (event, d) {
            showTooltip(
              esc(d.count) + ' users enjoy both <b>' + esc(d.labelA) + '</b> and <b>' + esc(d.labelB) + '</b>',
              event
            );
          })
          .on('mouseleave', function () {
            activeLink = null;
            applyHighlight();
            hideTooltip();
          });

        const nodeSel = root
          .append('g')
          .attr('class', 'ov-affinity-nodes')
          .selectAll('g')
          .data(nodes)
          .join('g')
          .attr('class', 'ov-affinity-node')
          .call(
            d3
              .drag()
              .on('start', function (event, d) {
                if (!event.active) simulation.alphaTarget(0.28).restart();
                d.fx = d.x;
                d.fy = d.y;
              })
              .on('drag', function (event, d) {
                d.fx = event.x;
                d.fy = event.y;
              })
              .on('end', function (event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
              })
          )
          .on('mouseenter', function (event, d) {
            activeNodeId = d.id;
            activeLink = null;
            applyHighlight();
            showTooltip(
              '<b>' + esc(d.label) + '</b><br>' + esc(d.clicks) + ' clicks · ' + esc(d.users) + ' users',
              event
            );
          })
          .on('mousemove', function (event, d) {
            showTooltip(
              '<b>' + esc(d.label) + '</b><br>' + esc(d.clicks) + ' clicks · ' + esc(d.users) + ' users',
              event
            );
          })
          .on('mouseleave', function () {
            activeNodeId = null;
            applyHighlight();
            hideTooltip();
          });

        nodeSel
          .append('circle')
          .attr('r', function (d) {
            return radiusScale(d.clicks);
          })
          .attr('fill', 'rgba(0, 212, 170, 0.22)')
          .attr('stroke', 'rgba(0, 212, 170, 0.85)')
          .attr('stroke-width', 2);

        nodeSel
          .append('text')
          .attr('class', 'ov-affinity-node-label')
          .attr('dy', function (d) {
            return radiusScale(d.clicks) + 14;
          })
          .attr('font-size', compact ? 9 : 11)
          .text(function (d) {
            const lbl = String(d.label || '');
            if (!compact || lbl.length <= 11) return lbl;
            return lbl.replace(' & ', ' ').slice(0, 10) + '…';
          });

        const simulation = d3
          .forceSimulation(nodes)
          .force(
            'link',
            d3
              .forceLink(links)
              .id(function (d) {
                return d.id;
              })
              .distance(function (d) {
                return (compact ? 55 : 90) + linkWidthScale(d.count) * (compact ? 5 : 8);
              })
              .strength(0.55)
          )
          .force('charge', d3.forceManyBody().strength(compact ? -260 : -420))
          .force('center', d3.forceCenter(width / 2, height / 2))
          .force(
            'collide',
            d3.forceCollide().radius(function (d) {
              return radiusScale(d.clicks) + 10;
            })
          )
          .force('x', d3.forceX(width / 2).strength(0.04))
          .force('y', d3.forceY(height / 2).strength(0.04));

        simulation.on('tick', function () {
          linkSel
            .attr('x1', function (d) {
              return d.source.x;
            })
            .attr('y1', function (d) {
              return d.source.y;
            })
            .attr('x2', function (d) {
              return d.target.x;
            })
            .attr('y2', function (d) {
              return d.target.y;
            });
          nodeSel.attr('transform', function (d) {
            return 'translate(' + d.x + ',' + d.y + ')';
          });
        });

        affinityNetworkCleanup = function () {
          simulation.stop();
          host.innerHTML = '';
        };
      }

      function renderTouristSegmentDetail(seg) {
        const detailHost = document.getElementById('tourist-segment-detail');
        if (!detailHost) return;
        if (!seg) {
          detailHost.innerHTML =
            '<p class="ov-segment-detail-hint">Click a segment on the wheel to explore user profiles, preferences, and predicted next events.</p>';
          return;
        }
        const cats =
          seg.topCategories && seg.topCategories.length
            ? seg.topCategories.map(function (c) {
                return esc(c.label) + ' (' + esc(c.count) + ')';
              }).join(' · ')
            : '—';

      function initTouristSegmentWheel(segmentsData) {
        destroySegmentWheel();
        const host = document.getElementById('chart-tourist-segments');
        if (!host || typeof d3 === 'undefined') return;

        const data = segmentsData || {};
        const segments = data.segments || [];
        if (!segments.length) {
          host.innerHTML = '<div class="ov-chart-empty">No segment definitions available.</div>';
          return;
        }

        const width = Math.max(host.clientWidth || 0, 220);
        const height = Math.max(host.clientHeight || 0, 200);
        const radius = Math.min(width, height) / 2 - 14;
        const innerR = radius * 0.42;
        const outerBase = radius * 0.88;
        const outerActive = radius * 0.98;
        const totalUsers = data.totalUsers != null ? data.totalUsers : 0;
        let selectedId = null;

        host.innerHTML = '';
        const svg = d3
          .select(host)
          .append('svg')
          .attr('viewBox', [-width / 2, -height / 2, width, height])
          .attr('width', '100%')
          .attr('height', '100%')
          .attr('preserveAspectRatio', 'xMidYMid meet');

        const g = svg.append('g');

        const pie = d3
          .pie()
          .sort(null)
          .padAngle(0.028)
          .value(function (d) {
            return Math.max(d.count || 0, 0.2);
          });

        const arc = d3
          .arc()
          .innerRadius(innerR)
          .outerRadius(function (d) {
            const seg = d.data;
            return selectedId === seg.id ? outerActive : outerBase;
          });

        const labelArc = d3
          .arc()
          .innerRadius((innerR + outerBase) / 2)
          .outerRadius((innerR + outerBase) / 2);

        const arcs = g
          .selectAll('.ov-segment-arc')
          .data(pie(segments))
          .join('g')
          .attr('class', 'ov-segment-arc')
          .on('click', function (event, d) {
            event.stopPropagation();
            selectedId = selectedId === d.data.id ? null : d.data.id;
            updateWheel();
            renderTouristSegmentDetail(selectedId ? d.data : null);
          })
          .on('mouseenter', function (event, d) {
            if (!selectedId) {
              g.selectAll('.ov-segment-arc').classed('ov-segment-arc--dim', function (x) {
                return x.data.id !== d.data.id;
              });
            }
          })
          .on('mouseleave', function () {
            if (!selectedId) {
              g.selectAll('.ov-segment-arc').classed('ov-segment-arc--dim', false);
            }
          });

        arcs
          .append('path')
          .attr('d', arc)
          .attr('fill', function (d) {
            return d.data.color || '#00d4aa';
          })
          .attr('opacity', function (d) {
            return (d.data.count || 0) > 0 ? 0.9 : 0.35;
          });

        arcs
          .append('text')
          .attr('class', 'ov-segment-arc-label')
          .attr('transform', function (d) {
            return 'translate(' + labelArc.centroid(d) + ')';
          })
          .attr('dy', '0.35em')
          .each(function (d) {
            const pct =
              totalUsers > 0 ? Math.round(((d.data.count || 0) / totalUsers) * 100) : 0;
            const name = String(d.data.name || '');
            const short = name.length > 12 ? name.slice(0, 10) + '…' : name;
            d3.select(this).text(width > 280 ? short + ' ' + pct + '%' : pct + '%');
          });

        const center = g.append('g').attr('class', 'ov-segment-center');
        center
          .append('text')
          .attr('class', 'ov-segment-center-total')
          .attr('text-anchor', 'middle')
          .attr('dy', '-0.15em')
          .text(String(totalUsers));
        center
          .append('text')
          .attr('class', 'ov-segment-center-sub')
          .attr('text-anchor', 'middle')
          .attr('dy', '1.2em')
          .text('users');

        function updateWheel() {
          arcs
            .classed('ov-segment-arc--active', function (d) {
              return selectedId === d.data.id;
            })
            .classed('ov-segment-arc--dim', function (d) {
              return selectedId && selectedId !== d.data.id;
            });
          arcs
            .select('path')
            .transition()
            .duration(380)
            .ease(d3.easeCubicOut)
            .attr('d', arc);
          arcs
            .select('text')
            .transition()
            .duration(380)
            .attr('transform', function (d) {
              return 'translate(' + labelArc.centroid(d) + ')';
            });
        }

        updateWheel();

        segmentWheelCleanup = function () {
          host.innerHTML = '';
        };
      }

      function chartPalette(n) {
        const base = ['#00d4aa', '#d4a017', '#7af0d8', '#e8c547', '#3d9e8f', '#c9a227', '#5eebc9', '#f0d78c'];
        const out = [];
        for (let i = 0; i < n; i++) out.push(base[i % base.length]);
        return out;

      function initOverviewCharts(d) {
        destroyOverviewCharts();
        const charts = (d && d.charts) || {};
        if (typeof Chart === 'undefined') {
          initAffinityNetworkGraph(charts.categoryAffinity || {});
          initTouristSegmentWheel(charts.touristSegments || {});
          initGeoCharts(d);
          return;
        }
        const teal = '#00d4aa';
        const gold = '#d4a017';
        const grid = 'rgba(255,255,255,0.08)';
        const tick = '#9ea8a8';

        function radarAxisMax(values, isPercent) {
          const peak = Math.max.apply(null, (values || []).concat([0]));
          if (peak <= 0) return isPercent ? 10 : 10;
          const headroom = peak * 1.12;
          if (isPercent) {
            if (headroom <= 10) return 10;
            if (headroom <= 30) return Math.ceil(headroom / 5) * 5;
            if (headroom <= 60) return Math.ceil(headroom / 10) * 10;
            return Math.min(100, Math.ceil(headroom / 10) * 10);
          }
          if (headroom <= 10) return 10;
          if (headroom <= 100) return Math.ceil(headroom / 10) * 10;
          if (headroom <= 1000) return Math.ceil(headroom / 50) * 50;
          return Math.ceil(headroom / 100) * 100;
        }

        function shortenRadarLabel(label, maxLen) {
          const s = String(label || '');
          const limit = maxLen || 16;
          if (s.length <= limit) return s;
          const cut = s.slice(0, limit - 1).trim();
          return cut + '…';
        }

        const demandSupplyEl = document.getElementById('chart-demand-supply');
        const demandSupply = charts.demandVsSupply || {};
        if (demandSupplyEl && demandSupply.labels && demandSupply.labels.length) {
          const demandPcts = demandSupply.demandPct || [];
          const supplyPcts = demandSupply.supplyPct || [];
          const rMax = radarAxisMax(demandPcts.concat(supplyPcts), true);
          overviewCharts.push(new Chart(demandSupplyEl, {
            type: 'radar',
            data: {
              labels: demandSupply.labels,
              datasets: [
                {
                  label: 'Tourist demand',
                  data: demandPcts,
                  backgroundColor: 'rgba(0, 212, 170, 0.2)',
                  borderColor: teal,
                  borderWidth: 2,
                  pointBackgroundColor: teal,
                  pointBorderColor: '#121212',
                  pointBorderWidth: 1,
                  pointRadius: 5,
                  pointHoverRadius: 7,
                },
                {
                  label: 'Event supply',
                  data: supplyPcts,
                  backgroundColor: 'rgba(212, 160, 23, 0.18)',
                  borderColor: gold,
                  borderWidth: 2,
                  pointBackgroundColor: gold,
                  pointBorderColor: '#121212',
                  pointBorderWidth: 1,
                  pointRadius: 5,
                  pointHoverRadius: 7,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              layout: { padding: { top: 2, bottom: 2, left: 4, right: 4 } },
              plugins: {
                legend: {
                  display: true,
                  position: 'top',
                  align: 'end',
                  labels: {
                    color: tick,
                    boxWidth: 10,
                    padding: 6,
                    font: { size: 10 },
                  },
                },
                tooltip: {
                  callbacks: {
                    label: function (ctx) {
                      return ctx.dataset.label + ': ' + ctx.raw + '%';
                    },
                  },
                },
              },
              scales: {
                r: {
                  beginAtZero: true,
                  max: rMax,
                  grid: { color: grid },
                  angleLines: { color: grid },
                  pointLabels: {
                    color: tick,
                    font: { size: 9 },
                    padding: 3,
                    callback: function (label) {
                      return shortenRadarLabel(label, 12);
                    },
                  },
                  ticks: {
                    display: false,
                    stepSize: rMax <= 10 ? 2 : rMax <= 30 ? 5 : rMax <= 60 ? 10 : 20,
                  },
                },
              },
            },
          }));
        }

        const stayEl = document.getElementById('chart-tourist-stay-duration');
        const stay = charts.touristStayDuration || {};
        if (stayEl && stay.labels && stay.labels.length && (stay.sampleCount || 0) > 0) {
          const maxStay = Math.max.apply(null, (stay.values || []).concat([1]));

                  return 'rgba(0, 212, 170, ' + alpha.toFixed(3) + ')';
                }),

                borderWidth: 1,
                borderRadius: 6,
                maxBarThickness: 42,

            options: {

              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: function (ctx) {
                      const n = ctx.raw || 0;
                      const total = stay.sampleCount || 1;
                      const pct = Math.round((n / total) * 100);
                      return n + ' trip' + (n === 1 ? '' : 's') + ' (' + pct + '%)';

                  ticks: { color: tick, precision: 0, font: { size: 11 } },

        const stayCatEl = document.getElementById('chart-stay-by-category');

                      const trips = (stayCat.tripCounts || [])[ctx.dataIndex] || 0;

                  grid: { color: grid },

                  ticks: { color: tick, font: { size: 11 } },

                y: {
                  grid: { display: false },
                  ticks: { color: tick, font: { size: 12 } },
                },
              },
            },
          }));

        const seasonalEl = document.getElementById('chart-seasonal-arrivals');
        const seasonal = charts.seasonalArrivals || {};
        const seasonalVals = seasonal.values || [];
        if (seasonalEl && seasonalVals.length) {
          const maxSeason = Math.max.apply(null, seasonalVals.concat([0]));
          const peakIdx = maxSeason > 0 ? seasonalVals.indexOf(maxSeason) : -1;
          overviewCharts.push(new Chart(seasonalEl, {
            type: 'bar',
            data: {
              labels: seasonal.labels || [],
              datasets: [{
                label: 'Planned arrivals',
                data: seasonalVals,
                backgroundColor: seasonalVals.map(function (v, i) {
                  if (!v) return 'rgba(255, 255, 255, 0.06)';
                  if (i === peakIdx) return 'rgba(0, 212, 170, 0.88)';

                  if (!v) return 'rgba(255, 255, 255, 0.08)';
                  return i === peakIdx ? teal : gold;

                borderWidth: 1,
                borderRadius: 6,
                maxBarThickness: 48,
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: function (ctx) {
                      const total = seasonal.sampleCount || 1;
                      const pct = Math.round((ctx.raw / total) * 100);
                      return ctx.raw + ' arrival signal' + (ctx.raw === 1 ? '' : 's') + ' (' + pct + '% of total)';
                    },
                  },
                },
              },
              scales: {
                x: {
                  grid: { display: false },
                  ticks: { color: tick, font: { size: 11 } },
                },
                y: {
                  grid: { color: grid },
                  ticks: { color: tick, precision: 0, font: { size: 11 } },
                  beginAtZero: true,
                },
              },
            },
          }));
        }

        const peakTimeline = (charts.peakActivityTimeline) || {};
        const browsingEl = document.getElementById('chart-peak-browsing-hours');
        const browsingVals = peakTimeline.hourlyData || [];
        const hourLabels = peakTimeline.hourLabels || browsingVals.map(function (_, i) { return String(i); });
        if (browsingEl && browsingVals.length) {
          const maxBrowse = Math.max.apply(null, browsingVals.concat([0]));
          const peakHourIdx = peakTimeline.peakHour != null ? peakTimeline.peakHour : (maxBrowse > 0 ? browsingVals.indexOf(maxBrowse) : -1);
          overviewCharts.push(new Chart(browsingEl, {
            type: 'bar',

              labels: hourLabels,
              datasets: [{
                label: 'Chat queries',
                data: browsingVals,
                backgroundColor: browsingVals.map(function (v, i) {

      function renderTableCard(opts) {
        let html = '<section class="card">';
        html += '<header class="card-head"><div><h2 class="card-title">' + esc(opts.title) + '</h2>';
        if (opts.meta) html += '<div class="meta">' + esc(opts.meta) + '</div>';
        html += '</div>';
        if (opts.controls) html += '<div class="controls">' + opts.controls + '</div>';
        html += '</header>';
        if (!opts.rows || !opts.rows.length) {
          html += '<div class="empty">' + esc(opts.empty || 'No rows found') + '</div>';
        } else {
          html += '<table><thead><tr>' + opts.headers + '</tr></thead><tbody>' + opts.rows + '</tbody></table>';
        }
        if (opts.pagination) html += opts.pagination;
        html += '</section>';
        return html;
      }

      function sortIndicator(col, key, dir) {
        if (col !== key) return '';
        return dir === 'asc' ? ' ↑' : ' ↓';
      }

            '<td>' + esc(r.email) + '</td>' +
            '<td>' + esc(r.categories || '—') + '</td>' +
            '<td>' + esc(r.vibes || '—') + '</td>' +
            '<td>' + esc(r.budget || '—') + '</td>' +
            '<td>' + esc(r.travelDistance || '—') + '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('content').innerHTML = renderTableCard({
          title: 'Fan DNA Preferences',
          meta: j.notice || 'One row per user preference profile',
          headers: '<th>User email</th><th>Categories</th><th>Vibes</th><th>Budget</th><th>Travel distance</th>',
          rows: rows,
          empty: 'No Fan DNA records.',
          pagination: pagination(j.totalPages || 1, j.page || 1, 'fandna-prev', 'fandna-next')
        });
      }

      async function renderClicks() {
        const j = await api('clicks', { page: state.clicks.page });
        const rows = (j.rows || []).map(function (r) {
          return '<tr>' +
            '<td>' + esc(r.userEmail || '—') + '</td>' +
            '<td>' + esc(r.eventName || '—') + '</td>' +
            '<td><span class="pill">' + esc(r.platform || '—') + '</span></td>' +
            '<td>' + esc(fmtDate(r.timestamp)) + '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('content').innerHTML = renderTableCard({
          title: 'Event Clicks',
          meta: j.notice || 'Sorted by latest first',
          headers: '<th>User email</th><th>Event name</th><th>Platform</th><th>Timestamp</th>',
          rows: rows,
          empty: 'No click records.',
          pagination: pagination(j.totalPages || 1, j.page || 1, 'clicks-prev', 'clicks-next')
        });
      }

      async function renderPopular() {
        const j = await api('popular');
        const rows = (j.rows || []).slice(0, 20).map(function (r) {
          return '<tr>' +
            '<td>' + esc(r.eventName || '—') + '</td>' +
            '<td><span class="pill">' + esc(r.platform || '—') + '</span></td>' +
            '<td>' + esc(r.totalClicks || 0) + '</td>' +
          '</tr>';
        }).join('');
        document.getElementById('content').innerHTML = renderTableCard({
          title: 'Popular Events',
          meta: 'Top 20 events by click count',
          headers: '<th>Event name</th><th>Platform</th><th>Total clicks</th>',
          rows: rows,
          empty: 'No event clicks yet.'
        });
      }

      async function renderItineraries() {
        const s = state.itineraries;
        const j = await api('itineraries', { userPage: s.userPage, recentPage: s.recentPage });
        const counts = j.countsByUser || { rows: [], totalPages: 1, page: 1, notice: 'Unavailable' };
        const recent = j.recentSaves || { rows: [], totalPages: 1, page: 1 };

        const rowsCounts = (counts.rows || []).map(function (r) {
          return '<tr><td>' + esc(r.userEmail || '—') + '</td><td>' + esc(r.itineraryCount || 0) + '</td></tr>';
        }).join('');
        const rowsRecent = (recent.rows || []).map(function (r) {
          return '<tr>' +
            '<td>' + esc(r.userEmail || '—') + '</td>' +
            '<td>' + esc(r.eventTitle || '—') + '</td>' +
            '<td>' + esc(r.city || '—') + '</td>' +
            '<td>' + esc(r.arrival || '—') + '</td>' +
            '<td>' + esc(r.departure || '—') + '</td>' +
            '<td>' + esc(fmtDate(r.savedAt)) + '</td>' +
          '</tr>';
        }).join('');

        document.getElementById('content').innerHTML =
          renderTableCard({
            title: 'Itineraries per user',
            meta: counts.notice || 'Grouped by user',
            headers: '<th>User email</th><th>Total itineraries generated</th>',
            rows: rowsCounts,
            empty: 'No per-user itinerary rows.',
            pagination: pagination(counts.totalPages || 1, counts.page || 1, 'itn-user-prev', 'itn-user-next')
          }) +
          renderTableCard({
            title: 'Recent itinerary saves',
            meta: j.schemaNote || 'Latest saved itinerary rows',
            headers: '<th>User email</th><th>Event</th><th>City</th><th>Arrival</th><th>Departure</th><th>Saved at</th>',
            rows: rowsRecent,
            empty: 'No saved itineraries.',
            pagination: pagination(recent.totalPages || 1, recent.page || 1, 'itn-recent-prev', 'itn-recent-next')
          });
      }

      function fmtApiCost2(v) {
        const n = Number(v) || 0;
        return '$' + n.toFixed(2);
      }

      function fmtApiCost4(v) {
        const n = Number(v) || 0;
        return '$' + n.toFixed(4);
      }

      function fmtApiTableCost(v) {
        const n = Number(v) || 0;
        return n === 0 ? 'Free' : fmtApiCost4(n);
      }

      function quotaBarColor(fillPct) {
        const ratio = fillPct / 100;
        if (ratio > 0.95) return '#f87171';
        if (ratio > 0.8) return '#d4a017';
        return '#00d4aa';
      }

      function initApiUsageChart(dailyUsage) {
        destroyApiUsageChart();
        const el = document.getElementById('api-usage-daily-chart');
        if (!el || !dailyUsage || !dailyUsage.length) return;
        const labels = dailyUsage.map(function (d) {
          try {
            const dt = new Date(d.date + 'T12:00:00');
            return dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
          } catch (e) {
            return d.date;
          }
        });
        const values = dailyUsage.map(function (d) { return d.count || 0; });
        const teal = '#00d4aa';
        const grid = 'rgba(255,255,255,0.08)';
        const tick = '#9ea8a8';
        apiUsageChart = new Chart(el, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'API calls',
              data: values,
              borderColor: teal,
              backgroundColor: 'rgba(0, 212, 170, 0.12)',
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: teal,
              tension: 0.25,
              fill: true,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { top: 2, right: 4, bottom: 0, left: 0 } },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function (ctx) {
                    return (ctx.raw || 0) + ' call' + (ctx.raw === 1 ? '' : 's');
                  },
                },
              },
            },
            scales: {
              x: {
                grid: { color: grid },
                ticks: { color: tick, font: { size: 10 }, maxRotation: 45 },
              },
              y: {
                grid: { color: grid },
                ticks: { color: tick, precision: 0, font: { size: 10 } },
                beginAtZero: true,
              },
            },
          },
        });
      }

      async function renderApiUsage() {
        destroyApiUsageChart();
        const j = await api('api-usage');
        const d = j.data || {};
        if (d.empty) {
          document.getElementById('content').innerHTML =
            '<div class="overview-dash"><div class="empty">No API usage data yet</div></div>';
          return;
        }

        const s = d.summary || {};
        const serp = d.serpapi || {};
        const fillPct = Math.min(100, Number(serp.fillPct) || 0);
        const barColor = quotaBarColor(fillPct);

        let featureHtml = '';
        (d.byFeature || []).forEach(function (f) {
          featureHtml +=
            '<article class="ov-impact">' +
              '<div class="k">' + esc(f.icon || '') + ' ' + esc(f.label || f.feature) + '</div>' +
              '<div class="api-feature-detail">' +
                'Calls: <strong>' + esc(String(f.calls || 0)) + '</strong><br>' +
                'Cost: <strong>' + esc(fmtApiCost4(f.cost)) + '</strong><br>' +
                'Success rate: <strong>' + esc(String(f.successRate != null ? f.successRate + '%' : '—')) + '</strong>' +
              '</div>' +
            '</article>';
        });
        if (!featureHtml) {
          featureHtml = '<div class="empty">No DashScope usage yet</div>';
        }

        const recentRows = (d.recent || []).map(function (r) {
          return '<tr>' +
            '<td>' + esc(fmtDate(r.timestamp)) + '</td>' +
            '<td>' + esc(r.provider || '—') + '</td>' +
            '<td>' + esc(r.feature || '—') + '</td>' +
            '<td>' + esc(r.model || '—') + '</td>' +
            '<td>' + esc(fmtApiTableCost(r.cost)) + '</td>' +
            '<td>' + (r.success ? '✅' : '❌') + '</td>' +
          '</tr>';
        }).join('');

        const serpMeta =
          serp.source === 'serpapi_account'
            ? 'Live from SerpAPI account' + (serp.planName ? ' · ' + serp.planName : '')
            : 'From local usage log (SerpAPI account unavailable)';

        document.getElementById('content').innerHTML =
          '<div class="overview-dash">' +
            '<div><div class="ov-section-title">Summary</div>' +
            '<div class="stats ov-stats-row">' +
              cardStat('Calls Today', String(s.callsToday || 0)) +
              cardStat('Calls This Month', String(s.callsThisMonth || 0)) +
              cardStat('Cost Today', fmtApiCost2(s.costToday)) +
              cardStat('Cost This Month', fmtApiCost2(s.costThisMonth)) +
            '</div></div>' +
            '<section class="card">' +
              '<header class="card-head"><div><h2 class="card-title">SerpAPI Quota</h2><div class="meta">' + esc(serpMeta) + '</div></div></header>' +
              '<div class="api-card-body">' +
                '<div class="api-quota-meta">' +
                  '<span>Used: <strong>' + esc(String(serp.used || 0)) + ' / ' + esc(String(serp.limit || 250)) + '</strong></span>' +
                  '<span>Remaining: <strong>' + esc(String(serp.remaining != null ? serp.remaining : 0)) + ' searches</strong></span>' +
                  '<span>Renews: <strong>' + esc(serp.renewsLabel || '—') + '</strong></span>' +
                '</div>' +
                '<div class="api-quota-bar-wrap" role="progressbar" aria-valuenow="' + esc(String(Math.round(fillPct))) + '" aria-valuemin="0" aria-valuemax="100">' +
                  '<div class="api-quota-bar-fill" style="width:' + esc(String(fillPct)) + '%;background:' + esc(barColor) + ';"></div>' +
                '</div>' +
                '<div class="api-quota-breakdown">' +
                  '<span>🏨 Hotels (this app): <strong>' + esc(String(serp.hotelsCount || 0)) + '</strong></span>' +
                  '<span>✈️ Flights (this app): <strong>' + esc(String(serp.flightsCount || 0)) + '</strong></span>' +
                '</div>' +
              '</div>' +
            '</section>' +
            '<div><div class="ov-section-title">By feature (DashScope)</div>' +
            '<div class="ov-impact-grid api-usage-features">' + featureHtml + '</div></div>' +
            '<section class="card ov-chart-card api-usage-chart-card">' +
              '<header class="card-head"><div><h2 class="card-title">Daily usage (last 14 days)</h2><div class="meta">All providers combined</div></div></header>' +
              '<div class="ov-card-viz"><div class="ov-chart-wrap"><canvas id="api-usage-daily-chart"></canvas></div></div>' +
            '</section>' +
            renderTableCard({
              title: 'Recent calls',
              meta: 'Last 20 API requests',
              headers: '<th>Timestamp</th><th>Provider</th><th>Feature</th><th>Model</th><th>Cost</th><th>Status</th>',
              rows: recentRows,
              empty: 'No recent calls',
            }) +
          '</div>';

        requestAnimationFrame(function () {
          initApiUsageChart(d.dailyUsage || []);
        });
      }

      async function renderSection() {
        showError('');
        renderNav();
        if (state.section !== 'overview') destroyOverviewCharts();
        if (state.section !== 'api-usage') destroyApiUsageChart();
        try {
          if (state.section === 'overview') return await renderOverview();
          if (state.section === 'users') return await renderUsers();
          if (state.section === 'fandna') return await renderFanDna();
          if (state.section === 'clicks') return await renderClicks();
          if (state.section === 'popular') return await renderPopular();
          if (state.section === 'itineraries') return await renderItineraries();
          if (state.section === 'api-usage') return await renderApiUsage();
        } catch (e) {
          showError(e && e.message ? e.message : 'Could not load section');
          document.getElementById('content').innerHTML = '';
        }
      }

      document.addEventListener('click', function (ev) {
        const navBtn = ev.target.closest('[data-s]');
        if (navBtn) {
          state.section = navBtn.getAttribute('data-s');
          renderSection();
          return;
        }
        const pager = ev.target.closest('[data-page-act]');
        if (!pager) return;
        const act = pager.getAttribute('data-page-act');
        if (act === 'users-prev' && state.users.page > 1) state.users.page -= 1;
        if (act === 'users-next') state.users.page += 1;
        if (act === 'fandna-prev' && state.fandna.page > 1) state.fandna.page -= 1;
        if (act === 'fandna-next') state.fandna.page += 1;
        if (act === 'clicks-prev' && state.clicks.page > 1) state.clicks.page -= 1;
        if (act === 'clicks-next') state.clicks.page += 1;
        if (act === 'itn-user-prev' && state.itineraries.userPage > 1) state.itineraries.userPage -= 1;
        if (act === 'itn-user-next') state.itineraries.userPage += 1;
        if (act === 'itn-recent-prev' && state.itineraries.recentPage > 1) state.itineraries.recentPage -= 1;
        if (act === 'itn-recent-next') state.itineraries.recentPage += 1;
        renderSection();
      });

      document.addEventListener('click', function (ev) {
        const th = ev.target.closest('th.sortable[data-sort]');
        if (!th || state.section !== 'users') return;
        const key = th.getAttribute('data-sort');
        if (state.users.sort === key) state.users.dir = state.users.dir === 'asc' ? 'desc' : 'asc';
        else { state.users.sort = key; state.users.dir = 'asc'; }
        state.users.page = 1;
        renderSection();
      });

      (async function init() {
        if (!(await ensureAdmin())) return;
        bindSignOutButton();
        renderNav();
        await renderSection();
      })();
    })();
  </script>
</body>
</html>
